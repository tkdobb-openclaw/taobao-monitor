<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤿 潜水装备价格监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header .subtitle { opacity: 0.9; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .stat-card .number { font-size: 2em; font-weight: bold; color: #667eea; }
        .model-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .model-title { font-size: 1.5em; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid #667eea; }
        .price-table { width: 100%; border-collapse: collapse; }
        .price-table th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; }
        .price-table td { padding: 12px; border-bottom: 1px solid #e9ecef; }
        .price-low { color: #28a745; font-weight: bold; }
        .price-high { color: #dc3545; }
        .update-time { text-align: center; color: white; opacity: 0.8; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤿 Shearwater 潜水表价格监控</h1>
            <div class="subtitle">实时监控淘宝/天猫价格变动</div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="number">20</div>
                <div class="label">监控商品</div>
            </div>
            <div class="stat-card">
                <div class="number">6</div>
                <div class="label">型号类别</div>
            </div>
            <div class="stat-card">
                <div class="number">5</div>
                <div class="label">监控店铺</div>
            </div>
            <div class="stat-card">
                <div class="number" id="updateTime">--</div>
                <div class="label">最后更新</div>
            </div>
        </div>

        <div id="content">加载中...</div>
        
        <div class="update-time">
            数据每天 08:00 & 17:00 自动更新
        </div>
    </div>

    <script>
        // 价格数据（这里会被自动替换）
        const priceData = {
            "Perdix": [
                { shop: "大洋潜水", price: 6313, sku: "perdix2 ti 银色" },
                { shop: "塞班户外", price: 6876, sku: "PERDIX 2 Ti/银色/" },
                { shop: "岁老板", price: 7046, sku: "Ti Black（钛黑版）" },
                { shop: "三潜社", price: 7119, sku: "PERDIX 2 Ti BLACK" },
                { shop: "白鳍鲨", price: 7341, sku: "PERDIX 2 Ti BLACK" }
            ],
            "Peregrine": [
                { shop: "塞班户外", price: 3124, sku: "黑色经典版" },
                { shop: "大洋潜水", price: 3137, sku: "Peregrine 灰色" },
                { shop: "白鳍鲨", price: 3387, sku: "peregrine黑色" },
                { shop: "三潜社", price: 3387, sku: "peregrine黑色" },
                { shop: "岁老板", price: 3643, sku: "普通版黑蓝色" }
            ],
            "Peregrine TX": [
                { shop: "大洋潜水", price: 4335, sku: "Peregrine TX 需预定" },
                { shop: "塞班户外", price: 4399, sku: "黑色 TX 版" },
                { shop: "白鳍鲨", price: 4795, sku: "peregrine TX黑色" },
                { shop: "三潜社", price: 4795, sku: "peregrine TX黑色" },
                { shop: "岁老板", price: 4888, sku: "TX版黑色" }
            ],
            "Teric": [
                { shop: "大洋潜水", price: 6184, sku: "浅灰色" },
                { shop: "塞班户外", price: 6879, sku: "黑盘黑表带" },
                { shop: "岁老板", price: 6880, sku: "黑色" },
                { shop: "白鳍鲨", price: 6995, sku: "黑色" },
                { shop: "三潜社", price: 7295, sku: "黑色" }
            ],
            "Tern": [
                { shop: "大洋潜水", price: 3601, sku: "Tern" },
                { shop: "岁老板", price: 3726, sku: "TERN 银色（现货）" },
                { shop: "白鳍鲨", price: 3951, sku: "TERN" },
                { shop: "塞班户外", price: 3991, sku: "TERN New" },
                { shop: "三潜社", price: 4391, sku: "TERN" }
            ],
            "Tern TX": [
                { shop: "大洋潜水", price: 4556, sku: "Tern TX" },
                { shop: "岁老板", price: 4971, sku: "TERN TX 黑色（现货）" },
                { shop: "白鳍鲨", price: 5271, sku: "TERN TX" },
                { shop: "三潜社", price: 5271, sku: "TERN TX" },
                { shop: "塞班户外", price: 5391, sku: "TERN TX" }
            ]
        };

        function render() {
            const content = document.getElementById('content');
            let html = '';
            
            for (const [model, items] of Object.entries(priceData)) {
                const minPrice = Math.min(...items.map(i => i.price));
                const maxPrice = Math.max(...items.map(i => i.price));
                
                html += `
                    <div class="model-section">
                        <div class="model-title">⌚ ${model}</div>
                        <div style="color:#666;margin-bottom:15px;">价格区间: ¥${minPrice.toLocaleString()} - ¥${maxPrice.toLocaleString()} (价差 ¥${(maxPrice-minPrice).toLocaleString()})</div>
                        <table class="price-table">
                            <thead>
                                <tr><th>店铺</th><th>SKU</th><th>价格</th><th>状态</th></tr>
                            </thead>
                            <tbody>
                `;
                
                items.sort((a, b) => a.price - b.price).forEach(item => {
                    const isLowest = item.price === minPrice;
                    const priceClass = isLowest ? 'price-low' : (item.price === maxPrice ? 'price-high' : '');
                    const status = isLowest ? '⭐ 最低价' : '';
                    
                    html += `
                        <tr>
                            <td><strong>${item.shop}</strong></td>
                            <td>${item.sku}</td>
                            <td class="${priceClass}">¥${item.price.toLocaleString()}</td>
                            <td>${status}</td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table></div>';
            }
            
            content.innerHTML = html;
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        render();
    </script>
</body>
</html>
